syntax = "proto3";

package chat;

service ChatService {
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse);
}

message GetMessagesRequest {
  uint32 limit = 1;
}

message GetMessagesResponse {
  repeated ChatMessage messages = 1;
  optional IngestStatus youtube_status = 2;
}

message IngestStatus {
  string state = 1;
  string detail = 2;
  int64 last_success_at_ms = 3;
  uint64 messages_received = 4;
}

message ChatMessage {
  string id = 1;
  string platform = 2;
  string sender = 3;
  string content = 4;
  int64 timestamp = 5;
}
